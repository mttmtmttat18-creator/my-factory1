<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <titl>​﴿وَتَوَكَّل عَلَى الحَيِّ الَّذي لا يَموتُ﴾</title>
    <style>
        :root { --neon: #00ffcc; --gold: #ffd700; --bg: #050505; }
        
        body {
            margin: 0; padding: 15px;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #000);
            color: #fff; font-family: 'Segoe UI', 'Cairo', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px;
            width: 95%; max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 22px; margin-bottom: 20px; }

        .input-box { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; color: #fff; padding: 12px; margin: 10px 0; border-radius: 12px; outline: none; box-sizing: border-box; transition: 0.3s; }
        .input-box:focus { border-color: var(--neon); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-deploy { background: var(--neon); color: #000; }
        .btn-copy { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--gold); }

        /* منطقة الـ QR الديناميكي للرابط المستخرج */
        #result-section {
            display: none; /* تظهر فقط بعد النشر */
            margin-top: 20px;
            padding: 15px;
            background: #fff;
            border-radius: 20px;
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }
        #qr-image { width: 160px; height: 160px; }
        #link-display { color: #000; font-size: 11px; margin-top: 10px; word-break: break-all; font-weight: bold; }

        /* مستطيل الآيات الملكي */
        #quran-container {
            margin-top: 25px;
            padding: 18px;
            background: #000;
            border-radius: 15px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
        #quran-text {
            color: #fff;
            font-size: 16px;
            transition: opacity 1s ease-in-out;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            font-family: 'Amiri', serif;
        }

        /* حسابات التواصل */
        .social-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }
        .social-btn {
            text-decoration: none;
            color: #ccc;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: 0.3s;
        }
        .social-btn:hover { background: var(--gold); color: #000; transform: translateY(-3px); }

        #status { margin-top: 10px; font-size: 12px; color: var(--neon); }
    </style>
</head>
<body>

<div class="main-card">
    <h1>​﴿اللَّهُمَّ صَلِّ عَلَىٰ مُحَمَّدٍ وَعَلَىٰ آلِ مُحَمَّدٍ﴾</h1></h1>
    
    <input type="text" id="repoName" class="input-box" placeholder="📁 اسم المشروع (مثال: my-site)">
    <textarea id="htmlCode" class="input-box" rows="5" placeholder="✍️ ألصق كود الـ HTML هنا..."></textarea>
    
    <div class="btn-row">
        <button class="btn btn-deploy" onclick="deploy()">⚡استخرج الرابط</button>
        <button class="btn btn-copy" onclick="copyUrl()">🔗 نسخ الرابط</button>
    </div>

    <div id="status"></div>

    <div id="result-section">
        <img id="qr-image" src="" alt="QR Code">
        <div id="link-display"></div>
    </div>

    <div id="quran-container">
        <div id="quran-text">﴿وَاصبِر لِحُكمِ رَبِّكَ فَإِنَّكَ بِأَعيُنِنا﴾</div>
    </div>

    <div class="social-links">
        <a href="https://www.instagram.com/7_ht7?igsh=d2tqdjlmOHJkeHJr" target="_blank" class="social-btn">📸 إنستغرام</a>
        <a href="https://T.me/Haed313r" target="_blank" class="social-btn">✈️ تليجرام</a>
    </div>
</div>

<script>
    const GITHUB_TOKEN = "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";
    const USERNAME = "mttmtmttat18-creator";
    let lastUrl = "";

    // 1. نظام الآيات
    const ayats = [
        "﴿وَاصبِر لِحُكمِ رَبِّكَ فَإِنَّكَ بِأَعيُنِنا﴾",
        "﴿إِنَّ مَعَ العُسرِ يُسرًا﴾",
        "﴿وَقُل رَبِّ زِدني عِلمًا﴾",
        "﴿فَإِنّي قَريبٌ أُجيبُ دَعوَةَ الدّاعِ﴾",
        "﴿وَتَوَكَّل عَلَى الحَيِّ الَّذي لا يَموتُ﴾",
        "﴿إِنَّ اللَّهَ مع الصَّابِرِينَ﴾"
    ];
    let ayatIndex = 0;
    setInterval(() => {
        const txt = document.getElementById('quran-text');
        txt.style.opacity = 0;
        setTimeout(() => {
            ayatIndex = (ayatIndex + 1) % ayats.length;
            txt.innerText = ayats[ayatIndex];
            txt.style.opacity = 1;
        }, 1000);
    }, 6000);

    // 2. وظيفة النشر وتوليد الـ QR
    async function deploy() {
        const repo = document.getElementById('repoName').value.trim().replace(/\s+/g, '-').toLowerCase();
        const code = document.getElementById('htmlCode').value;
        const status = document.getElementById('status');
        const resultSec = document.getElementById('result-section');

        if (!repo || !code) return alert("اتكب اسم المشروع + الصق الكود");

        status.innerText = "⏳ جاري النشر وتوليد الـ QR...";

        try {
            const headers = {"Authorization": `token ${GITHUB_TOKEN}`, "Accept": "application/vnd.github.v3+json"};
            
            // إنشاء المستودع
            await fetch('https://api.github.com/user/repos', { method: 'POST', headers, body: JSON.stringify({ name: repo, auto_init: true }) });
            await new Promise(r => setTimeout(r, 2000));

            // رفع الملف
            const b64 = btoa(unescape(encodeURIComponent(code)));
            await fetch(`https://api.github.com/repos/${USERNAME}/${repo}/contents/index.html`, {
                method: 'PUT', headers, body: JSON.stringify({ message: "Deploy", content: b64 })
            });

            // تفعيل Pages
            await fetch(`https://api.github.com/repos/${USERNAME}/${repo}/pages`, { method: 'POST', headers, body: JSON.stringify({ source: { branch: "main", path: "/" } }) });

            lastUrl = `https://${USERNAME}.github.io/${repo}/`;
            
            // تحديث واجهة الـ QR
            document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(lastUrl)}`;
            document.getElementById('link-display').innerText = lastUrl;
            resultSec.style.display = "block";
            status.innerText = "✅ تم النشر وتوليد الـ QR بنجاح!";

        } catch (e) {
            status.innerText = "❌ حدث خطأ في النشر.";
        }
    }

    // 3. وظيفة النسخ
    function copyUrl() {
        if (!lastUrl) return alert("انشر الموقع أولاً!");
        navigator.clipboard.writeText(lastUrl);
        alert("✅ تم نسخ الرابط المستخرج!");
    }
</script>
</body>
</html>
